- name: Install MicroK8s and Tailscale on Debian Trixie
  hosts: debian
  become: true
  tasks:

    - name: Ensure required packages are installed
      apt:
        name:
          - curl
          - git
          - vim
          - gnupg
          - snapd
          - linux-headers-amd64
          - nvidia-driver
        state: present
        update_cache: yes

    - name: Ensure snap path is available
      shell: "export PATH=$PATH:/snap/bin"
      args:
        executable: /bin/bash

    - name: Install MicroK8s via snap
      snap:
        name: microk8s
        classic: yes
        channel: latest/stable
        state: present

    - name: Add current user to microk8s group
      user:
        name: "{{ ansible_user_id }}"
        groups: microk8s
        append: yes

    - name: Download Tailscale GPG key
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg
        dest: /tmp/tailscale.gpg
        mode: '0644'

    - name: Convert Tailscale key to keyring
      ansible.builtin.command: gpg --dearmor -o /usr/share/keyrings/tailscale-archive-keyring.gpg /tmp/tailscale.gpg
      args:
        creates: /usr/share/keyrings/tailscale-archive-keyring.gpg

    - name: Add Tailscale repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/tailscale.list
        content: |
          deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/debian trixie main

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Tailscale
      apt:
        name: tailscale
        state: present

    - name: Add NVIDIA GPG key
      ansible.builtin.shell: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
        gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
      args:
        creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

    - name: Add NVIDIA container toolkit repository
      ansible.builtin.shell: |
        curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
        sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
        tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
      args:
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install NVIDIA container toolkit
      apt:
        name:
          - nvidia-container-runtime
        state: present

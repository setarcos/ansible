---
- name: Install fail2ban
  package:
    name: fail2ban
    state: present

- name: Install sshd jail (Arch/Void)
  copy:
    src: sshd.jail
    dest: /etc/fail2ban/jail.d/sshd.local
    owner: root
    group: root
    mode: '0644'
  when: ansible_facts['distribution'] == "Archlinux"

- name: Install sshd jail (Void Linux)
  copy:
    src: "sshd.local"
    dest: "/etc/fail2ban/sshd.local"
    owner: root
    group: root
    mode: '0644'
  when: ansible_facts['distribution'] == "Void"

- name: Configure systemd backend (Debian)
  lineinfile:
    path: /etc/fail2ban/jail.d/defaults-debian.conf
    line: backend = systemd
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: Enable and start fail2ban (systemd)
  systemd:
    name: fail2ban
    enabled: yes
    state: started
    daemon_reload: yes
  when: ansible_facts['service_mgr'] == "systemd"

- name: Enable fail2ban (Void runit)
  command: ln -sf /etc/sv/fail2ban /var/service/
  when: ansible_facts['distribution'] == "Void"

- name: Start fail2ban (Void runit)
  command: sv start fail2ban
  when: ansible_facts['distribution'] == "Void"

- name: Disable SSH password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
  notify: restart sshd
